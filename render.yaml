services:
  - type: web
    name: wheelsonauto-platform
    env: node
    plan: starter
    buildCommand: ""
    startCommand: "node server.js"
    disk:
      name: wheelsonauto-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: WOA_ADMIN_PIN
        sync: false
      - key: DATA_DIR
        value: /var/data
