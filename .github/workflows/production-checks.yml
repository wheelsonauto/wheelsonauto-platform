name: Production checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wheelsonauto:
    name: Full platform and PostgreSQL recovery checks
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run production regression suite
        run: pnpm run check
